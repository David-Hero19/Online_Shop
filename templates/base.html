<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Nexus Store{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-logo">NEXUS<span>.</span></a>
  <div class="nav-links">
    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Shop</a>
    <a href="/cart" class="nav-link cart-link {% if request.path == '/cart' %}active{% endif %}">
      Cart
      <span class="cart-badge" id="cartBadge" {% if cart_count == 0 %}style="display:none"{% endif %}>{{ cart_count }}</span>
    </a>
  </div>
</nav>

<!-- TOAST -->
<div id="toast" class="toast"></div>

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
